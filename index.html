<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>旅のしおり - Travel Planner</title>
  <meta name="description" content="旅行の予定を簡単に管理できるアプリ。Googleアカウントでログインしてどのデバイスからでもアクセス可能。">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#4F46E5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

      .no-print { display: none; }

</head>
<body>

  <script>

    const firebaseConfig = {
      apiKey: "AIzaSyAg9IVqc9hTTXdLCIjbU21gEqIFYrCzuXA",
      authDomain: "travel-planner-af8bd.firebaseapp.com",
      projectId: "travel-planner-af8bd",
      storageBucket: "travel-planner-af8bd.firebasestorage.app",

  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // アイコンコンポーネント
    const Calendar = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    );
    const Plane = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"></path>
      </svg>
    );
    const Train = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="4" y="4" width="16" height="16" rx="2"></rect>
        <path d="M4 11h16"></path>
        <path d="M12 4v7"></path>
        <path d="m8 20-2 2"></path>
        <path d="m16 20 2 2"></path>
      </svg>
    );
    const Hotel = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 21h18"></path>
        <path d="M9 8h1"></path>
        <path d="M9 12h1"></path>
        <path d="M9 16h1"></path>
        <path d="M14 8h1"></path>
        <path d="M14 12h1"></path>
        <path d="M14 16h1"></path>
        <path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"></path>
      </svg>
    );
    const Plus = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    );
    const X = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    );
    const ChevronRight = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    );
    const ChevronLeft = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    );
    const MapPin = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
        <circle cx="12" cy="10" r="3"></circle>
      </svg>
    );
    const Edit = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
    );
    const GripVertical = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="9" cy="12" r="1"></circle>
        <circle cx="9" cy="5" r="1"></circle>
        <circle cx="9" cy="19" r="1"></circle>
        <circle cx="15" cy="12" r="1"></circle>
        <circle cx="15" cy="5" r="1"></circle>
        <circle cx="15" cy="19" r="1"></circle>
      </svg>
    );
    const LogOut = (props) => (
      <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    );

    // ログイン・認証コンポーネント
    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsubscribe = window.auth.onAuthStateChanged((user) => {
          setUser(user);
          setLoading(false);
        });
        return unsubscribe;
      }, []);

      const signInWithGoogle = async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
          await window.auth.signInWithPopup(provider);
        } catch (error) {
          console.error('ログインエラー:', error);
          alert('ログインに失敗しました。もう一度お試しください。');
        }
      };

      const signOut = async () => {
        try {
          await window.auth.signOut();
        } catch (error) {
          console.error('ログアウトエラー:', error);
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center">
            <div className="text-center">
              <div className="text-4xl mb-4">✈️</div>
              <div className="text-gray-600">読み込み中...</div>
            </div>
          </div>
        );
      }

      if (!user) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
              <div className="text-6xl mb-6">✈️</div>
              <h1 className="text-3xl font-bold text-gray-800 mb-4">旅のしおり</h1>
              <p className="text-gray-600 mb-8">
                Googleアカウントでログインして<br />
                どのデバイスからでも旅行を管理
              </p>
              <button
                onClick={signInWithGoogle}
                className="w-full bg-white border-2 border-gray-300 text-gray-700 rounded-lg py-3 px-4 font-semibold hover:bg-gray-50 transition flex items-center justify-center gap-3"
              >
                <svg className="w-6 h-6" viewBox="0 0 24 24">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Googleでログイン
              </button>
              <p className="text-xs text-gray-500 mt-6">
                ログインすることで、利用規約に同意したものとみなされます
              </p>
            </div>
          </div>
        );
      }

      return <TravelApp user={user} onSignOut={signOut} />;
    }

    function TravelApp({ user, onSignOut }) {
      const [travels, setTravels] = useState([]);
      const [selectedTravel, setSelectedTravel] = useState(null);
      const [showAddTravel, setShowAddTravel] = useState(false);
      const [editingTravel, setEditingTravel] = useState(null);
      const [loading, setLoading] = useState(true);
      const [draggedTravelIndex, setDraggedTravelIndex] = useState(null);
      const [travelOrder, setTravelOrder] = useState([]);

      useEffect(() => {
        if (!user) return;
        const unsubscribe = window.db
          .collection('users').doc(user.uid).collection('travels')
          .onSnapshot((snapshot) => {
            const travelsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setTravels(travelsData);
            setLoading(false);
          }, (error) => { console.error('データ取得エラー:', error); setLoading(false); });
        return unsubscribe;
      }, [user]);

      // 表示順：orderフィールド優先、なければ開始日順
      const sortedTravels = [...travels].sort((a, b) => {
        if (a.order !== undefined && b.order !== undefined) return a.order - b.order;
        return new Date(a.startDate) - new Date(b.startDate);
      });

      const addTravel = async (travel) => {
        try {
          await window.db.collection('users').doc(user.uid).collection('travels').add({
            ...travel, items: [], order: travels.length,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          setShowAddTravel(false);
        } catch (error) { console.error('追加エラー:', error); alert('旅行の追加に失敗しました'); }
      };

      const updateTravel = async (updatedTravel) => {
        try {
          const { id, ...data } = updatedTravel;
          await window.db.collection('users').doc(user.uid).collection('travels').doc(id).update(data);
          setSelectedTravel(updatedTravel);
        } catch (error) { console.error('更新エラー:', error); alert('更新に失敗しました'); }
      };

      const editTravel = async (travel) => {
        try {
          const { id, ...data } = travel;
          await window.db.collection('users').doc(user.uid).collection('travels').doc(id).update(data);
          setEditingTravel(null);
        } catch (error) { console.error('編集エラー:', error); alert('編集に失敗しました'); }
      };

      const duplicateTravel = async (travel) => {
        try {
          const { id, createdAt, ...data } = travel;
          await window.db.collection('users').doc(user.uid).collection('travels').add({
            ...data, name: `${data.name}（コピー）`, order: travels.length,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        } catch (error) { console.error('複製エラー:', error); alert('複製に失敗しました'); }
      };

      const deleteTravel = async (id) => {
        if (confirm('この旅行を削除しますか？')) {
          try {
            await window.db.collection('users').doc(user.uid).collection('travels').doc(id).delete();
          } catch (error) { console.error('削除エラー:', error); alert('削除に失敗しました'); }
        }
      };

      // 旅行のドラッグ並び替え
      const handleTravelDragStart = (index) => setDraggedTravelIndex(index);

      const handleTravelDragOver = (e, index) => {
        e.preventDefault();
        if (draggedTravelIndex === null || draggedTravelIndex === index) return;
        const newSorted = [...sortedTravels];
        const dragged = newSorted[draggedTravelIndex];
        newSorted.splice(draggedTravelIndex, 1);
        newSorted.splice(index, 0, dragged);
        // ローカル即時反映用にorderを更新
        newSorted.forEach((t, i) => { t._tempOrder = i; });
        setDraggedTravelIndex(index);
        setTravels(prev => prev.map(t => {
          const found = newSorted.find(n => n.id === t.id);
          return found ? { ...t, order: found._tempOrder } : t;
        }));
      };

      const handleTravelDragEnd = async () => {
        setDraggedTravelIndex(null);
        // Firestoreに順序を保存
        const batch = window.db.batch();
        sortedTravels.forEach((t, i) => {
          const ref = window.db.collection('users').doc(user.uid).collection('travels').doc(t.id);
          batch.update(ref, { order: i });
        });
        try { await batch.commit(); } catch (e) { console.error('順序保存エラー:', e); }
      };

      if (selectedTravel) {
        return (
          <TravelDetail 
            travel={selectedTravel} user={user}
            onBack={() => setSelectedTravel(null)}
            onUpdate={updateTravel} onSignOut={onSignOut}
          />
        );
      }

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
          <div className="max-w-2xl mx-auto p-4">
            <div className="bg-white rounded-2xl shadow-lg p-6 mb-6">
              <div className="flex items-center justify-between mb-4">
                <div>
                  <h1 className="text-3xl font-bold text-gray-800 mb-2">✈️ 旅のしおり</h1>
                  <p className="text-gray-600">旅行を整理して、快適な旅を</p>
                </div>
                <div className="flex items-center gap-3">
                  <img src={user.photoURL || 'https://via.placeholder.com/40'} alt={user.displayName || 'User'} className="w-10 h-10 rounded-full" />
                  <button onClick={onSignOut} className="text-gray-500 hover:text-gray-700 transition" title="ログアウト">
                    <LogOut size={20} />
                  </button>
                </div>
              </div>
            </div>

            <button
              onClick={() => setShowAddTravel(true)}
              className="w-full bg-indigo-600 text-white rounded-xl py-4 mb-6 font-semibold shadow-lg hover:bg-indigo-700 transition flex items-center justify-center gap-2"
            >
              <Plus size={24} />新しい旅行を追加
            </button>

            {loading ? (
              <div className="bg-white rounded-xl p-8 text-center text-gray-500">読み込み中...</div>
            ) : (
              <div className="space-y-4">
                {sortedTravels.length === 0 ? (
                  <div className="bg-white rounded-xl p-8 text-center text-gray-500">
                    旅行がまだありません<br />上のボタンから追加してください
                  </div>
                ) : (
                  sortedTravels.map((travel, index) => (
                    <TravelCard 
                      key={travel.id} travel={travel} index={index}
                      onClick={() => setSelectedTravel(travel)}
                      onEdit={() => setEditingTravel(travel)}
                      onDuplicate={() => duplicateTravel(travel)}
                      onDelete={deleteTravel}
                      onDragStart={handleTravelDragStart}
                      onDragOver={handleTravelDragOver}
                      onDragEnd={handleTravelDragEnd}
                    />
                  ))
                )}
              </div>
            )}

            {showAddTravel && (
              <TravelModal onClose={() => setShowAddTravel(false)} onSave={addTravel} />
            )}
            {editingTravel && (
              <TravelModal travel={editingTravel} onClose={() => setEditingTravel(null)} onSave={editTravel} />
            )}
          </div>
        </div>
      );
    }

    function TravelCard({ travel, index, onClick, onEdit, onDuplicate, onDelete, onDragStart, onDragOver, onDragEnd }) {
      const [showMenu, setShowMenu] = useState(false);

      const formatDateRange = (start, end) => {
        const startDate = new Date(start);
        const endDate = new Date(end);
        return `${startDate.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric' })} - ${endDate.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric' })}`;
      };

      const totalAmount = (travel.items || []).reduce((sum, item) => sum + (Number(item.amount) || 0), 0);

      return (
        <div
          draggable
          onDragStart={() => onDragStart(index)}
          onDragOver={(e) => onDragOver(e, index)}
          onDragEnd={onDragEnd}
          className="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition"
        >
          <div className="p-5">
            <div className="flex items-start gap-3">
              <div className="text-gray-300 cursor-grab mt-1">
                <GripVertical size={20} />
              </div>
              <div className="flex-1 cursor-pointer" onClick={onClick}>
                <div className="flex items-start justify-between mb-3">
                  <div>
                    <h3 className="font-bold text-xl text-gray-800 mb-1">{travel.name}</h3>
                    <div className="text-sm text-gray-600">📍 {travel.destination}</div>
                  </div>
                  <div className="relative" onClick={e => e.stopPropagation()}>
                    <button
                      onClick={() => setShowMenu(!showMenu)}
                      className="text-gray-400 hover:text-gray-600 p-1"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="19" r="1"></circle>
                      </svg>
                    </button>
                    {showMenu && (
                      <div className="absolute right-0 top-8 bg-white rounded-xl shadow-xl border border-gray-100 z-10 w-40 py-1">
                        <button onClick={() => { onEdit(); setShowMenu(false); }} className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2">
                          <Edit size={14} /> 編集
                        </button>
                        <button onClick={() => { onDuplicate(); setShowMenu(false); }} className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2">
                          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                          複製
                        </button>
                        <hr className="my-1" />
                        <button onClick={() => { onDelete(travel.id); setShowMenu(false); }} className="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2">
                          <X size={14} /> 削除
                        </button>
                      </div>
                    )}
                  </div>
                </div>
                <div className="flex items-center gap-2 text-sm text-gray-600">
                  <Calendar size={16} />
                  {formatDateRange(travel.startDate, travel.endDate)}
                </div>
                <div className="mt-3 flex items-center justify-between">
                  <div className="text-sm text-gray-500">{travel.items?.length || 0}件の予定</div>
                  {totalAmount > 0 && (
                    <div className="text-sm font-semibold text-indigo-600">合計 ¥{totalAmount.toLocaleString()}</div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function TravelModal({ travel = null, onClose, onSave }) {
      const [formData, setFormData] = useState(travel || { name: '', destination: '', startDate: '', endDate: '' });

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!formData.name || !formData.destination || !formData.startDate || !formData.endDate) {
          alert('すべての項目を入力してください'); return;
        }
        onSave(formData);
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl max-w-lg w-full">

              </div>
              <form onSubmit={handleSubmit} className="space-y-4">
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-2">旅行名 *</label>
                  <input type="text" value={formData.name}
                    onChange={(e) => setFormData({ ...formData, name: e.target.value })}

                    placeholder="例: 東京出張、札幌旅行" />

                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-2">行き先 *</label>
                  <input type="text" value={formData.destination}
                    onChange={(e) => setFormData({ ...formData, destination: e.target.value })}
                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    placeholder="例: 東京、札幌" />
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">開始日 *</label>
                    <input type="date" value={formData.startDate}
                      onChange={(e) => setFormData({ ...formData, startDate: e.target.value })}
                      className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">終了日 *</label>
                    <input type="date" value={formData.endDate}

                  </div>

                <button type="submit" className="w-full bg-indigo-600 text-white rounded-lg py-3 font-semibold hover:bg-indigo-700 transition">
                  {travel ? '保存' : '追加'}
                </button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    function TravelDetail({ travel, onBack, onUpdate }) {
      const [items, setItems] = useState(travel.items || []);
        const [sortByTime, setSortByTime] = React.useState(false);
      const [showAddItem, setShowAddItem] = useState(false);
      const [editingItem, setEditingItem] = useState(null);
      const [selectedQR, setSelectedQR] = useState(null);
      const [draggedIndex, setDraggedIndex] = useState(null);
      const [showAIImport, setShowAIImport] = useState(false);

      useEffect(() => {
        setItems(travel.items || []);
      }, [travel]);

      const saveItems = (newItems) => {
        setItems(newItems);
        onUpdate({ ...travel, items: newItems });
      };

      const addItem = (item) => {
        const newItems = [...items, { ...item, id: Date.now() }];
        saveItems(newItems);
        setShowAddItem(false);
      };

      const updateItem = (updatedItem) => {
        const newItems = items.map(item => 
          item.id === updatedItem.id ? updatedItem : item
        );
        saveItems(newItems);
        setEditingItem(null);
      };

      const deleteItem = (id) => {
        if (confirm('この予定を削除しますか？')) {
          saveItems(items.filter(item => item.id !== id));
        }
      };

      const duplicateItem = (item) => {
        const { id, ...rest } = item;
        const newItem = { ...rest, id: Date.now(), title: `${item.title}（コピー）` };
        const newItems = [...items, newItem];
        saveItems(newItems);
      };

      const handleDragStart = (index) => {
        setDraggedIndex(index);
      };

      const handleDragOver = (e, index) => {
        e.preventDefault();
        if (draggedIndex === null || draggedIndex === index) return;

        const newItems = [...items];
        const draggedItem = newItems[draggedIndex];
        newItems.splice(draggedIndex, 1);
        newItems.splice(index, 0, draggedItem);
        
        setItems(newItems);
        setDraggedIndex(index);
      };

      const handleDragEnd = () => {
        saveItems(items);
        setDraggedIndex(null);
      };

      // Excel出力機能
              const handleClaudeImport = () => {
          const travelName = currentTravel ? currentTravel.name : '現在の旅行';
          const msg = `同じタブグループにある予約サイト（ANA・JAL・じゃらん・楽天トラベル・Yahoo!乗り換え案内など）のページを読み取って、「${travelName}」の旅行に予定を自動で追加してください。各タブの内容を確認して、フライト・ホテル・乗り換えの情報を入力してください。`;
          navigator.clipboard.writeText(msg).then(() => {
            alert('✅ Claudeへの指示をコピーしました！\nClaude in Chromeのサイドパネルに貼り付けてEnterを押してください。');
          });
        };

        const downloadExcel = () => {
        const typeLabel = { flight: '飛行機', train: '電車', hotel: 'ホテル', other: 'その他' };
        const statusLabel = {
          flight: { undecided: '未定', reserved_unpaid: '予約（未購入）', reserved_paid: '予約（購入済）' },
          train: { undecided: '未定', walk_in: '飛び乗り', reserved: '予約済' },
          hotel: { undecided: '未定', reserved: '予約済' },
          other: { undecided: '未定', reserved: '予約済' }
        };

        const wb = XLSX.utils.book_new();

        // ===== 旅費明細シート =====
        const wsData = [];
        wsData.push(['旅行名', travel.name]);
        wsData.push(['行き先', travel.destination]);
        wsData.push(['期間', travel.startDate + ' 〜 ' + travel.endDate]);
        wsData.push([]);
        wsData.push(['種類', 'タイトル', '日時', 'ステータス', '金額（円）', '詳細', 'キャンセル期日', 'メモ']);

        items.forEach(item => {
          const status = item.status ? (statusLabel[item.type]?.[item.status] || item.status) : '';
          let detail = '';
          if (item.type === 'flight') detail = [item.airline, item.flightNumber, item.flightTimeStart && item.flightTimeEnd ? item.flightTimeStart + '〜' + item.flightTimeEnd : ''].filter(Boolean).join(' ');
          if (item.type === 'train') detail = [item.trainLine, item.trainDestination, item.trainPlatform].filter(Boolean).join(' ');
          if (item.type === 'hotel') detail = item.address || '';
          if (item.type === 'other') detail = item.destination || '';

          wsData.push([
            typeLabel[item.type] || item.type,
            item.title,
            item.datetime ? new Date(item.datetime).toLocaleString('ja-JP') : '',
            status,
            item.amount ? Number(item.amount) : '',
            detail,
            item.cancelDeadline ? new Date(item.cancelDeadline).toLocaleString('ja-JP') : '',
            item.notes || ''
          ]);
        });

        const total = items.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
        wsData.push([]);
        wsData.push(['合計金額', '', '', '', total, '', '', '']);

        const ws = XLSX.utils.aoa_to_sheet(wsData);
        ws['!cols'] = [
          { wch: 10 }, { wch: 28 }, { wch: 20 }, { wch: 16 },
          { wch: 12 }, { wch: 30 }, { wch: 20 }, { wch: 30 }
        ];
        XLSX.utils.book_append_sheet(wb, ws, '旅費明細');

        // ===== サマリーシート =====
        const summary = {};
        items.forEach(item => {
          const label = typeLabel[item.type] || item.type;
          if (!summary[label]) summary[label] = { count: 0, total: 0 };
          summary[label].count++;
          summary[label].total += Number(item.amount) || 0;
        });

        const wsSumData = [
          ['旅行名', travel.name],
          ['行き先', travel.destination],
          [],
          ['種類', '件数', '小計（円）'],
          ...Object.entries(summary).map(([k, v]) => [k, v.count, v.total]),
          [],
          ['合計', items.length, total]
        ];
        const wsSum = XLSX.utils.aoa_to_sheet(wsSumData);
        wsSum['!cols'] = [{ wch: 12 }, { wch: 8 }, { wch: 14 }];
        XLSX.utils.book_append_sheet(wb, wsSum, 'サマリー');

        XLSX.writeFile(wb, travel.name + '_旅費明細.xlsx');
      };

      // 領収書一括ダウンロード機能
      const downloadAllReceipts = async () => {
        const allReceipts = items.flatMap(item => item.receipts || []);
        console.log('全領収書:', allReceipts);
        
        if (allReceipts.length === 0) {
          alert('ダウンロードできる領収書がありません');
          return;
        }

        const zip = new JSZip();
        let successCount = 0;

        for (let i = 0; i < allReceipts.length; i++) {
          const receipt = allReceipts[i];
          console.log(`処理中[${i + 1}/${allReceipts.length}]:`, receipt.name, receipt.url ? 'URL' : 'Base64');
          
          try {
            if (receipt.url) {
              // Firebase StorageのURL
              console.log('  Fetching:', receipt.url);
              const response = await fetch(receipt.url, { mode: 'cors' });
              if (!response.ok) throw new Error(`HTTP ${response.status}`);
              const blob = await response.blob();
              console.log('  Blob size:', blob.size);
              zip.file(`${i + 1}_${receipt.name}`, blob);
              successCount++;
            } else if (receipt.data) {
              // Base64データ
              const base64Data = receipt.data.split(',')[1];
              if (base64Data) {
                console.log('  Base64 length:', base64Data.length);
                zip.file(`${i + 1}_${receipt.name}`, base64Data, { base64: true });
                successCount++;
              }
            } else {
              console.warn('  スキップ: URLもdataもなし');
            }
          } catch (err) {
            console.error(`  エラー[${receipt.name}]:`, err);
          }
        }

        console.log(`成功: ${successCount}/${allReceipts.length}件`);

        if (successCount === 0) {
          alert('領収書のダウンロードに失敗しました。\nブラウザのコンソール（F12）でエラーを確認してください。');
          return;
        }

        console.log('ZIP生成中...');
        const content = await zip.generateAsync({ type: 'blob' });
        console.log('ZIP size:', content.size);
        
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${travel.name}_領収書_${successCount}件.zip`;
        a.click();
        URL.revokeObjectURL(url);
        console.log('ダウンロード完了');
      };

      const totalAmount = items.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
          <div className="max-w-2xl mx-auto p-4">
            <button
              onClick={onBack}
              className="mb-4 flex items-center gap-2 text-indigo-600 hover:text-indigo-800 font-semibold no-print"
            >
              <ChevronLeft size={20} />
              旅行一覧に戻る
            </button>

            <div className="bg-white rounded-2xl shadow-lg p-6 mb-6">
              <h1 className="text-3xl font-bold text-gray-800 mb-2">{travel.name}</h1>
              <div className="text-gray-600">📍 {travel.destination}</div>
              <div className="text-sm text-gray-500 mt-2">
                {new Date(travel.startDate).toLocaleDateString('ja-JP', { month: 'long', day: 'numeric' })} - 
                {new Date(travel.endDate).toLocaleDateString('ja-JP', { month: 'long', day: 'numeric' })}
              </div>
              {totalAmount > 0 && (
                <div className="mt-3 p-3 bg-indigo-50 rounded-xl">
                  <div className="text-sm text-indigo-600 font-semibold">💰 合計旅費</div>
                  <div className="text-2xl font-bold text-indigo-700">¥{totalAmount.toLocaleString()}</div>
                </div>
              )}
            </div>

            <div className="flex gap-3 mb-6 no-print overflow-x-auto pb-2 items-stretch">
              <button
                onClick={() => setShowAddItem(true)}
                className="flex-none w-28 h-16 bg-indigo-600 text-white rounded-xl text-sm font-semibold shadow-lg hover:bg-indigo-700 transition flex flex-col items-center justify-center gap-1 whitespace-nowrap"
              >
                <Plus size={20} />
                予定を追加
              </button>
              <button
                onClick={() => setShowAIImport(true)}
                className="flex-none w-28 h-16 bg-purple-600 text-white rounded-xl text-sm font-semibold shadow-lg hover:bg-purple-700 transition flex flex-col items-center justify-center gap-1 whitespace-nowrap"
                title="AIで自動入力"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 8v4l3 3"/><path d="M18 2l4 4-4 4"/><path d="M22 2l-4 4"/>
                </svg>
                AI入力
              </button>
              <div className="relative group">
                <button
                  onClick={handleClaudeImport}
                  className="flex-none w-28 h-16 bg-orange-500 text-white rounded-xl text-sm font-semibold shadow-lg hover:bg-orange-600 transition flex flex-col items-center justify-center gap-1 whitespace-nowrap"
                >
                  <span className="text-lg leading-none">🤖</span>
                  <span>Claude取込</span>
                </button>
                <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-72 bg-gray-900 text-white text-sm rounded-xl p-3 hidden group-hover:block shadow-xl z-50 pointer-events-none">
                  <div className="font-bold text-orange-300 mb-2">📋 使い方</div>
                  <div className="mb-2">
                    <span className="text-orange-300 font-semibold">方法①</span> このボタンを押す → 指示文がコピーされる → Claude in Chromeに貼り付けてEnter
                  </div>
                  <div>
                    <span className="text-orange-300 font-semibold">方法②</span> Claude in Chromeで <span className="bg-gray-700 px-1 rounded font-mono">/travel</span> と入力するだけ
                  </div>
                  <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-gray-900"></div>
                </div>
              </div>
              <button
                onClick={downloadExcel}
                className="flex-none w-28 h-16 bg-green-600 text-white rounded-xl text-sm font-semibold shadow-lg hover:bg-green-700 transition flex flex-col items-center justify-center gap-1 whitespace-nowrap"
                title="Excelダウンロード"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Excel
              </button>
              <button
                onClick={downloadAllReceipts}
                className="flex-none w-28 h-16 bg-blue-600 text-white rounded-xl text-sm font-semibold shadow-lg hover:bg-blue-700 transition flex flex-col items-center justify-center gap-1 whitespace-nowrap"
                title="領収書一括ダウンロード"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="21 8 21 21 3 21 3 8"></polyline>
                  <rect x="1" y="3" width="22" height="5"></rect>
                  <line x1="10" y1="12" x2="14" y2="12"></line>
                </svg>
                領収書
              </button>
            </div>

            {/* 時間順ソートボタン */}
            <div className="flex justify-end mb-2">
              <button
                onClick={() => setSortByTime(prev => !prev)}
                className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold shadow transition ${sortByTime ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-white text-gray-600 border border-gray-300 hover:bg-gray-50'}`}
                title="出発時刻で並べ替え"
              >
                ⏰ {sortByTime ? '時間順（ON）' : '時間順（OFF）'}
              </button>
            </div>

            <div className="space-y-4">
              {items.length === 0 ? (
                <div className="bg-white rounded-xl p-8 text-center text-gray-500">
                  予定がまだありません<br />
                  上のボタンから追加してください
                </div>
              ) : (
                (sortByTime
                  ? [...items].sort((a, b) => {
                      const ta = a.datetime ? new Date(a.datetime).getTime() : 0;
                      const tb = b.datetime ? new Date(b.datetime).getTime() : 0;
                      return ta - tb;
                    })
                  : items
                ).map((item, index) => (
                  <ItemCard
                    key={item.id}
                    item={item}
                    index={index}
                    onEdit={() => setEditingItem(item)}
                    onDuplicate={() => duplicateItem(item)}
                    onDelete={() => deleteItem(item.id)}
                    onQRClick={setSelectedQR}
                    onDragStart={handleDragStart}
                    onDragOver={handleDragOver}
                    onDragEnd={handleDragEnd}
                  />
                ))
              )}
            </div>

            {showAIImport && (
              <AIImportModal
                travel={travel}
                onClose={() => setShowAIImport(false)}
                onImport={(items) => {
                  items.forEach(item => addItem(item));
                  setShowAIImport(false);
                }}
              />
            )}

            {showAddItem && (
              <ItemModal
                travel={travel}
                onClose={() => setShowAddItem(false)}
                onSave={addItem}
              />
            )}

            {editingItem && (
              <ItemModal
                travel={travel}
                item={editingItem}
                onClose={() => setEditingItem(null)}
                onSave={updateItem}
              />
            )}

            {selectedQR && (
              <QRModal
                imageData={selectedQR}
                onClose={() => setSelectedQR(null)}
              />
            )}
          </div>
        </div>
      );
    }

    function ItemCard({ item, index, onEdit, onDuplicate, onDelete, onQRClick, onDragStart, onDragOver, onDragEnd }) {
      const getIcon = () => {
        switch(item.type) {
          case 'flight': return <Plane className="text-blue-600" size={24} />;
          case 'train': return <Train className="text-green-600" size={24} />;
          case 'hotel': return <Hotel className="text-purple-600" size={24} />;
          default: return <MapPin className="text-orange-600" size={24} />;
        }
      };

      const getTypeLabel = () => {
        switch(item.type) {
          case 'flight': return '飛行機';
          case 'train': return '電車';
          case 'hotel': return 'ホテル';
          default: return 'その他';
        }
      };

      const getStatusLabel = () => {
        const statusMap = {
          flight: { undecided: '未定', reserved_unpaid: '予約（未購入）', reserved_paid: '予約（購入済）' },
          train: { undecided: '未定', walk_in: '飛び乗り', reserved: '予約済' },
          hotel: { undecided: '未定', reserved: '予約済' },
          other: { undecided: '未定', reserved: '予約済' }
        };
        return statusMap[item.type]?.[item.status] || null;
      };

      const getStatusColor = () => {
        if (!item.status || item.status === 'undecided') return 'bg-gray-100 text-gray-600';
        if (item.status === 'reserved_paid' || item.status === 'reserved') return 'bg-green-100 text-green-700';
        if (item.status === 'reserved_unpaid') return 'bg-yellow-100 text-yellow-700';
        if (item.status === 'walk_in') return 'bg-blue-100 text-blue-700';
        return 'bg-gray-100 text-gray-600';
      };

      const formatDateTime = (datetime) => {
        const date = new Date(datetime);
        return date.toLocaleString('ja-JP', {
          month: 'long',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      };

      const statusLabel = getStatusLabel();

      return (
        <div
          draggable
          onDragStart={() => onDragStart(index)}
          onDragOver={(e) => onDragOver(e, index)}
          onDragEnd={onDragEnd}
          className="bg-white rounded-xl shadow-md overflow-hidden cursor-move hover:shadow-lg transition"
        >
          <div className="p-5">
            <div className="flex items-start gap-3">
              <div className="text-gray-400 cursor-grab active:cursor-grabbing mt-1 no-print">
                <GripVertical size={20} />
              </div>
              <div className="flex-1">
                <div className="flex items-start justify-between mb-2">
                  <div className="flex items-center gap-3">
                    {getIcon()}
                    <div>
                      <div className="flex items-center gap-2 mb-1">
                        <div className="text-xs text-gray-500">{getTypeLabel()}</div>
                        {statusLabel && (
                          <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${getStatusColor()}`}>
                            {statusLabel}
                          </span>
                        )}
                      </div>
                      <h3 className="font-bold text-lg text-gray-800">{item.title}</h3>
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    {item.amount > 0 && (
                      <div className="text-sm font-bold text-indigo-600">¥{Number(item.amount).toLocaleString()}</div>
                    )}
                    <div className="flex gap-2 no-print">
                      <button onClick={onEdit} className="text-gray-400 hover:text-indigo-500 transition" title="編集">
                        <Edit size={18} />
                      </button>
                      <button onClick={onDuplicate} className="text-gray-400 hover:text-green-500 transition" title="複製">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                      </button>
                      <button onClick={onDelete} className="text-gray-400 hover:text-red-500 transition" title="削除">
                        <X size={18} />
                      </button>
                    </div>
                  </div>
                </div>

                <div className="text-sm text-gray-600 mb-3">
                  <div className="flex items-center gap-2">
                    <Calendar size={16} />
                    出発: {formatDateTime(item.datetime)}
                  </div>
                </div>

                {item.type === 'flight' && (
                  <div className="space-y-2 text-sm">
                    {item.airline && (
                      <div className="text-gray-700">航空会社: <span className="font-semibold">{item.airline}</span></div>
                    )}
                    {item.flightNumber && (
                      <div className="text-gray-700">便名: <span className="font-semibold">{item.flightNumber}</span></div>
                    )}
                    {(item.flightTimeStart || item.flightTimeEnd) && (
                      <div className="text-gray-700">
                        ⏰ {item.flightTimeStart || '--:--'}～{item.flightTimeEnd || '--:--'}
                      </div>
                    )}
                  </div>
                )}

                {item.type === 'train' && (
                  <div className="space-y-2 text-sm">
                    {(item.trainTimeStart || item.trainTimeEnd) && (
                      <div className="text-gray-700">
                        ⏰ {item.trainTimeStart || '--:--'}～{item.trainTimeEnd || '--:--'}
                      </div>
                    )}
                    {item.trainLine && (
                      <div className="text-gray-700">🚃 {item.trainLine}</div>
                    )}
                    {item.trainDestination && (
                      <div className="text-gray-700">行き先: {item.trainDestination}</div>
                    )}
                    {item.trainPlatform && (
                      <div className="text-gray-700">乗り場: <span className="font-semibold">{item.trainPlatform}</span></div>
                    )}
                  </div>
                )}

                {item.type === 'hotel' && (
                  <div className="space-y-2 text-sm">
                    {item.address && (
                      <div className="text-gray-700">📍 {item.address}</div>
                    )}
                    {item.checkOut && (
                      <div className="text-gray-700">
                        チェックアウト: {new Date(item.checkOut).toLocaleString('ja-JP', {
                          month: 'long',
                          day: 'numeric',
                          hour: '2-digit',
                          minute: '2-digit'
                        })}
                      </div>
                    )}
                    {item.cancelDeadline && (() => {
                      const deadline = new Date(item.cancelDeadline);
                      const now = new Date();
                      const diffDays = (deadline - now) / (1000 * 60 * 60 * 24);
                      const isPast = diffDays < 0;
                      const isUrgent = diffDays >= 0 && diffDays <= 3;
                      return (
                        <div className={`flex items-center gap-1 font-semibold px-2 py-1 rounded-lg ${isPast ? 'bg-gray-100 text-gray-500' : isUrgent ? 'bg-red-100 text-red-700' : 'bg-yellow-50 text-yellow-700'}`}>
                          ⚠️ キャンセル期日: {deadline.toLocaleString('ja-JP', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
                          {isPast && <span className="text-xs ml-1">（期限切れ）</span>}
                          {isUrgent && <span className="text-xs ml-1">（あと{Math.max(0, Math.floor(diffDays))}日！）</span>}
                        </div>
                      );
                    })()}
                    {item.bookingSite && (() => {
                      const sites = {
                        jalan: { name: 'じゃらん', url: 'https://www.jalan.net/', color: 'bg-orange-50 text-orange-700 hover:bg-orange-100' },
                        rakuten: { name: '楽天トラベル', url: 'https://travel.rakuten.co.jp/', color: 'bg-red-50 text-red-700 hover:bg-red-100' },
                        booking: { name: 'Booking.com', url: 'https://www.booking.com/', color: 'bg-blue-50 text-blue-700 hover:bg-blue-100' },
                        agoda: { name: 'Agoda', url: 'https://www.agoda.com/', color: 'bg-purple-50 text-purple-700 hover:bg-purple-100' },
                        expedia: { name: 'Expedia', url: 'https://www.expedia.co.jp/', color: 'bg-yellow-50 text-yellow-700 hover:bg-yellow-100' },
                        other: { name: 'その他', url: item.customLink || '#', color: 'bg-gray-50 text-gray-700 hover:bg-gray-100' }
                      };
                      const site = sites[item.bookingSite];
                      return site ? (
                        <a
                          href={site.url}
                          target="_blank"
                          rel="noopener noreferrer"
                          className={`mt-2 block w-full rounded-lg py-3 text-center font-semibold transition no-print ${site.color}`}
                        >
                          🏨 {site.name}で確認
                        </a>
                      ) : null;
                    })()}
                  </div>
                )}

                {item.type === 'other' && (
                  <div className="space-y-2 text-sm">
                    {item.destination && (
                      <div className="text-gray-700">🎯 {item.destination}</div>
                    )}
                    {item.otherAddress && (
                      <div className="text-gray-700">📍 {item.otherAddress}</div>
                    )}
                  </div>
                )}

                {item.notes && (
                  <div className="mt-3 p-3 bg-gray-50 rounded-lg text-sm text-gray-700">
                    {item.notes}
                  </div>
                )}

                {item.attachments && item.attachments.length > 0 && (
                  <div className="mt-3">
                    <div className="text-xs font-semibold text-gray-600 mb-2">📎 予定情報</div>
                    <div className="space-y-2">
                      {item.attachments.map((file, index) => (
                        <a
                          key={index}
                          href={file.url || file.data}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="block p-2 bg-blue-50 text-blue-700 rounded text-sm hover:bg-blue-100 transition"
                        >
                          📄 {file.name}
                        </a>
                      ))}
                    </div>
                  </div>
                )}

                {item.receipts && item.receipts.length > 0 && (
                  <div className="mt-3">
                    <div className="text-xs font-semibold text-gray-600 mb-2">🧾 領収書</div>
                    <div className="space-y-2">
                      {item.receipts.map((file, index) => (
                        <a
                          key={index}
                          href={file.url || file.data}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="block p-2 bg-green-50 text-green-700 rounded text-sm hover:bg-green-100 transition"
                        >
                          🧾 {file.name}
                        </a>
                      ))}
                    </div>
                  </div>
                )}

                {item.qrCode && (
                  <button
                    onClick={() => onQRClick(item.qrCode)}
                    className="mt-3 w-full bg-indigo-50 text-indigo-700 rounded-lg py-3 font-semibold hover:bg-indigo-100 transition flex items-center justify-center gap-2 no-print"
                  >
                    QRコードを表示
                    <ChevronRight size={20} />
                  </button>
                )}

                {item.type === 'flight' && item.airline && (
                  <a
                    href={(() => {
                      switch(item.airline) {
                        case 'ANA': return 'https://www.ana.co.jp/fs/dom/jp/';
                        case 'JAL': return 'https://www.jal.co.jp/jp/ja/dom/flight-status/';
                        case 'ソラシドエア': return 'https://www.solaseedair.jp/flight_info/';
                        case 'スカイマーク': return 'https://www.skymark.co.jp/ja/flight_info/';
                        case 'ジェットスター': return 'https://www.jetstar.com/jp/ja/flight-status';
                        case 'ピーチ': return 'https://www.flypeach.com/jp/ja-jp/flightinfo';
                        default: return 'https://www.ana.co.jp/fs/dom/jp/';
                      }
                    })()}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="mt-2 block w-full bg-blue-50 text-blue-700 rounded-lg py-3 text-center font-semibold hover:bg-blue-100 transition no-print"
                  >
                    ✈️ 運航状況を確認
                  </a>
                )}

                {item.type === 'train' && (
                  <a
                    href="https://transit.yahoo.co.jp/"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="mt-2 block w-full bg-red-50 text-red-700 rounded-lg py-3 text-center font-semibold hover:bg-red-100 transition no-print"
                  >
                    🔍 Yahoo!乗り換え案内で検索
                  </a>
                )}

                {item.type === 'hotel' && item.address && (
                  <a
                    href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.address)}`}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="mt-2 block w-full bg-green-50 text-green-700 rounded-lg py-3 text-center font-semibold hover:bg-green-100 transition no-print"
                  >
                    🗺️ Googleマップで見る
                  </a>
                )}

                {item.type === 'other' && (
                  <>
                    {item.customLink && (
                      <a
                        href={item.customLink}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="mt-2 block w-full bg-purple-50 text-purple-700 rounded-lg py-3 text-center font-semibold hover:bg-purple-100 transition no-print"
                      >
                        🔗 リンクを開く
                      </a>
                    )}
                    {item.otherAddress && (
                      <a
                        href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.otherAddress)}`}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="mt-2 block w-full bg-green-50 text-green-700 rounded-lg py-3 text-center font-semibold hover:bg-green-100 transition no-print"
                      >
                        🗺️ Googleマップで見る
                      </a>
                    )}
                  </>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ItemModal({ travel, item = null, onClose, onSave }) {
      const [type, setType] = useState(item?.type || '');
      
      const getDefaultCheckOut = (datetime) => {
        const date = new Date(datetime || travel.startDate + 'T15:00');
        date.setDate(date.getDate() + 1);
        date.setHours(10, 0, 0, 0);
        return date.toISOString().slice(0, 16);
      };

      const [formData, setFormData] = useState(item || {
        title: '',
        datetime: travel.startDate + 'T09:00',
        status: 'undecided',
        amount: '',
        bookingSite: '',
        airline: '',
        flightNumber: '',
        flightTimeStart: '',
        flightTimeEnd: '',
        trainTimeStart: '',
        trainTimeEnd: '',
        trainLine: '',
        trainDestination: '',
        trainPlatform: '',
        address: '',
        checkOut: '',
        destination: '',
        otherAddress: '',
        customLink: '',
        notes: '',
        qrCode: null,
        attachments: [],
        receipts: []
      });

      // Firebase StorageにアップロードしてURLを返す
      const uploadToStorage = async (file, path) => {
        const user = window.auth.currentUser;
        if (!user) throw new Error('ログインが必要です');
        const ref = window.storage.ref(`users/${user.uid}/${path}/${Date.now()}_${file.name}`);
        await ref.put(file);
        return await ref.getDownloadURL();
      };

      const [uploading, setUploading] = useState(false);

      const handleImageUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        try {
          const url = await uploadToStorage(file, 'qrcodes');
          setFormData(prev => ({ ...prev, qrCode: url }));
        } catch (err) {
          console.error('QRアップロードエラー:', err);
          alert('アップロードに失敗しました');
        }
        setUploading(false);
      };

      const handleAttachmentsUpload = async (e) => {
        const files = Array.from(e.target.files);
        setUploading(true);
        try {
          const newFiles = await Promise.all(files.map(async file => {
            const url = await uploadToStorage(file, 'attachments');
            return { name: file.name, url, type: file.type };
          }));
          setFormData(prev => ({ ...prev, attachments: [...(prev.attachments || []), ...newFiles] }));
        } catch (err) {
          console.error('添付アップロードエラー:', err);
          alert('アップロードに失敗しました');
        }
        setUploading(false);
      };

      const handleReceiptsUpload = async (e) => {
        const files = Array.from(e.target.files);
        setUploading(true);
        try {
          const newFiles = await Promise.all(files.map(async file => {
            const url = await uploadToStorage(file, 'receipts');
            return { name: file.name, url, type: file.type };
          }));
          setFormData(prev => ({ ...prev, receipts: [...(prev.receipts || []), ...newFiles] }));
        } catch (err) {
          console.error('領収書アップロードエラー:', err);
          alert('アップロードに失敗しました');
        }
        setUploading(false);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (uploading) { alert('ファイルのアップロード中です。完了をお待ちください。'); return; }
        if (!type || !formData.title || !formData.datetime) {
          alert('種類、タイトル、出発時刻は必須です');
          return;
        }
        if (type === 'flight' && !formData.airline) {
          alert('航空会社を選択してください');
          return;
        }
        onSave({ ...formData, type });
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto">
            <div className="p-6">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-2xl font-bold text-gray-800">
                  {item ? '予定を編集' : '予定を追加'}
                </h2>
                <button onClick={onClose} className="text-gray-400 hover:text-gray-600">
                  <X size={24} />
                </button>
              </div>

              <form onSubmit={handleSubmit} className="space-y-4">
                {!type && !item ? (
                  <div className="grid grid-cols-2 gap-3">
                    <button
                      type="button"
                      onClick={() => setType('flight')}
                      className="p-6 border-2 border-gray-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition flex flex-col items-center gap-2"
                    >
                      <Plane size={32} className="text-blue-600" />
                      <span className="font-semibold">飛行機</span>
                    </button>
                    <button
                      type="button"
                      onClick={() => setType('train')}
                      className="p-6 border-2 border-gray-200 rounded-xl hover:border-green-500 hover:bg-green-50 transition flex flex-col items-center gap-2"
                    >
                      <Train size={32} className="text-green-600" />
                      <span className="font-semibold">電車</span>
                    </button>
                    <button
                      type="button"
                      onClick={() => setType('hotel')}
                      className="p-6 border-2 border-gray-200 rounded-xl hover:border-purple-500 hover:bg-purple-50 transition flex flex-col items-center gap-2"
                    >
                      <Hotel size={32} className="text-purple-600" />
                      <span className="font-semibold">ホテル</span>
                    </button>
                    <button
                      type="button"
                      onClick={() => setType('other')}
                      className="p-6 border-2 border-gray-200 rounded-xl hover:border-orange-500 hover:bg-orange-50 transition flex flex-col items-center gap-2"
                    >
                      <MapPin size={32} className="text-orange-600" />
                      <span className="font-semibold">その他</span>
                    </button>
                  </div>
                ) : (
                  <>
                    {item && (
                      <button
                        type="button"
                        onClick={() => setType('')}
                        className="text-sm text-indigo-600 hover:text-indigo-800"
                      >
                        ← 種類を変更
                      </button>
                    )}

                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        タイトル *
                      </label>
                      <input
                        type="text"
                        value={formData.title}
                        onChange={(e) => setFormData({ ...formData, title: e.target.value })}
                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="例: 羽田空港 → 福岡空港"
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        出発時刻 *
                      </label>
                      <input
                        type="datetime-local"
                        value={formData.datetime}
                        onChange={(e) => {
                          const newDatetime = e.target.value;
                          setFormData({ 
                            ...formData, 
                            datetime: newDatetime,
                            checkOut: type === 'hotel' && !item ? getDefaultCheckOut(newDatetime) : formData.checkOut
                          });
                        }}
                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        ステータス
                      </label>
                      <select
                        value={formData.status || 'undecided'}
                        onChange={(e) => setFormData({ ...formData, status: e.target.value })}
                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                      >
                        {type === 'flight' && <>
                          <option value="undecided">未定</option>
                          <option value="reserved_unpaid">予約（未購入）</option>
                          <option value="reserved_paid">予約（購入済）</option>
                        </>}
                        {type === 'train' && <>
                          <option value="undecided">未定</option>
                          <option value="walk_in">飛び乗り</option>
                          <option value="reserved">予約済</option>
                        </>}
                        {type === 'hotel' && <>
                          <option value="undecided">未定</option>
                          <option value="reserved">予約済</option>
                        </>}
                        {type === 'other' && <>
                          <option value="undecided">未定</option>
                          <option value="reserved">予約済</option>
                        </>}
                      </select>
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        金額（円）
                      </label>
                      <input
                        type="number"
                        value={formData.amount}
                        onChange={(e) => setFormData({ ...formData, amount: e.target.value })}
                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        placeholder="例: 15000"
                        min="0"
                      />
                    </div>

                    {type === 'flight' && (
                      <>
                        <div>
                          <label className="block text-sm font-semibold text-gray-700 mb-2">
                            航空会社 *
                          </label>
                          <select
                            value={formData.airline}
                            onChange={(e) => setFormData({ ...formData, airline: e.target.value })}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                          >
                            <option value="">選択してください</option>
                            <option value="ANA">ANA（全日空）</option>
                            <option value="JAL">JAL（日本航空）</option>
                            <option value="ソラシドエア">ソラシドエア</option>
                            <option value="スカイマーク">スカイマーク</option>
                            <option value="ジェットスター">ジェットスター</option>
                            <option value="ピーチ">Peach</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-semibold text-gray-700 mb-2">
                            便名
                          </label>
                          <input
                            type="text"
                            value={formData.flightNumber}
                            onChange={(e) => setFormData({ ...formData, flightNumber: e.target.value })}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                            placeholder="例: NH123"
                          />
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-2">
                              出発時刻
                            </label>
                            <input
                              type="time"
                              value={formData.flightTimeStart}
                              onChange={(e) => setFormData({ ...formData, flightTimeStart: e.target.value })}
                              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                            />
                          </div>
                          <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-2">
                              到着時刻
                            </label>
                            <input
                              type="time"
                              value={formData.flightTimeEnd}
                              onChange={(e) => setFormData({ ...formData, flightTimeEnd: e.target.value })}
                              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                            />
                          </div>
                        </div>
                        <div>
                          <label className="block text-sm font-semibold text-gray-700 mb-2">
                            搭乗券QRコード
                          </label>
                          <input
                            type="file"
                            accept="image/*"
                            onChange={handleImageUpload}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                          />
                          {formData.qrCode && (
                            <img src={formData.qrCode} alt="QR Preview" className="mt-2 w-32 h-32 object-contain border rounded" />
                          )}
                        </div>
                      </>
                    )}

                    {type === 'train' && (
                      <>
                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-2">
                              乗車時刻
                            </label>
                            <input
                              type="time"
                              value={formData.trainTimeStart}
                              onChange={(e) => setFormData({ ...formData, trainTimeStart: e.target.value })}
                              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                            />
                          </div>
                          <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-2">
                              到着時刻
                            </label>
                            <input
                              type="time"
                              value={formData.trainTimeEnd}
                              onChange={(e) => setFormData({ ...formData, trainTimeEnd: e.target.value })}
                              className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                            />
                          </div>
                        </div>
                        <div>
                          <label className="block text-sm font-semibold text-gray-700 mb-2">
                            路線
                          </label>
                          <input
                            type="text"
                            value={formData.trainLine}
                            onChange={(e) => setFormData({ ...formData, trainLine: e.target.value })}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                            placeholder="例: 山手線"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-semibold text-gray-700 mb-2">
                            行き先
                          </label>
                          <input
                            type="text"
                            value={formData.trainDestination}
                            onChange={(e) => setFormData({ ...formData, trainDestination: e.target.value })}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                            placeholder="例: 渋谷方面"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-semibold text-gray-700 mb-2">
                            乗り場
                          </label>
                          <input
                            type="text"
                            value={formData.trainPlatform}
                            onChange={(e) => setFormData({ ...formData, trainPlatform: e.target.value })}
                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                            placeholder="例: 3番線"
                          />
                        </div>
                      </>
                    )}

                    {type === 'hotel' && (
                      <>
                        <div>
                          <label className="block text-sm font-semibold text-gray-700 mb-2">
                            住所
                          </label>
                          <input
                            type="text"

      const SYSTEM_PROMPT = `あなたは旅行予約情報を抽出するAIです。
提供された情報（テキスト・画像・PDF）から旅行の予定を抽出し、以下のJSON配列形式で返してください。

typeは以下から選択:

{

ホテル予約の場合:
{

{

  "notes": "座席・クラスなど",
  "status": "undecided"
}

JSONの配列のみを返し、説明文・コードブロックは不要です。`;

      const handleFileChange = (e) => {
        const f = e.target.files[0];
        if (!f) return;
        setFile(f);
        const isImage = f.type.startsWith('image/');

        setFileType(isImage ? 'image' : isPDF ? 'pdf' : '');
        const reader = new FileReader();
        reader.onload = (ev) => setFilePreview(ev.target.result.split(',')[1]);
        reader.readAsDataURL(f);
      };

      const analyze = async () => {
        // 入力チェック
        if (mode === 'text' && !text.trim()) { setError('テキストを入力してください'); return; }
        if (mode === 'url' && !url.trim()) { setError('URLを入力してください'); return; }
        if (mode === 'file' && !filePreview) { setError('ファイルを選択してください'); return; }

        setLoading(true);
        setError('');
        setPreviews([]);

        try {
          let messages;

          if (mode === 'text') {
            messages = [{ role: 'user', content: `以下の予約・乗り換え情報から旅行予定を抽出してください:\n\n${text}` }];

          } else if (mode === 'url') {
            const isYahoo = url.includes('transit.yahoo') || url.includes('yahoo.co.jp');
            messages = [{ role: 'user', content: `以下のURL${isYahoo ? '（Yahoo!乗り換え案内）' : ''}の情報から旅行予定を抽出してください。\nURL: ${url}` }];

          } else if (mode === 'file') {
            // ファイルのMIMEタイプを正確に判定
            let mediaType = file.type || 'image/jpeg';
            // image/png, image/jpeg, image/webp, image/gif のみAPIが受け付ける
            const allowedImageTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
            if (mediaType === 'application/pdf') {
              // PDFはdocumentブロックで送信
              messages = [{
                role: 'user',
                content: [
                  { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: filePreview } },
                  { type: 'text', text: 'このPDFから旅行予定（ホテル予約・航空券・乗車券など）の情報をすべて抽出してください。' }
                ]
              }];
            } else {
              // 画像は image ブロックで送信（未対応タイプはjpegにフォールバック）
              if (!allowedImageTypes.includes(mediaType)) mediaType = 'image/jpeg';
              messages = [{
                role: 'user',
                content: [
                  { type: 'image', source: { type: 'base64', media_type: mediaType, data: filePreview } },
                  { type: 'text', text: 'この画像から旅行予定（ホテル予約・航空券・乗車券など）の情報をすべて抽出してください。複数便ある場合はすべて抽出してください。' }
                ]
              }];
            }
          }

          const apiKey = window.CLAUDE_API_KEY;
          if (!apiKey || apiKey === 'YOUR_CLAUDE_API_KEY_HERE') {
            setShowApiKeySetting(true);
            throw new Error('APIキーを設定してから再度お試しください。');
          }

          const response = await fetch('https://claudeproxy-otuqcpwg6q-uc.a.run.app', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-5-20250929',
              max_tokens: 2000,
              system: SYSTEM_PROMPT,
              messages
            })
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(`APIエラー ${response.status}: ${errData.error?.message || response.statusText}`);
          }

          const data = await response.json();
          if (data.error) throw new Error(data.error.message);

          const raw = data.content?.[0]?.text || '';
          // JSON部分だけ抽出（配列またはオブジェクト）
          const jsonMatch = raw.match(/\[.*\]|\{.*\}/s);
          if (!jsonMatch) throw new Error('AIの応答からJSONを抽出できませんでした');
          const parsed = JSON.parse(jsonMatch[0]);
          const items = Array.isArray(parsed) ? parsed : [parsed];

          const result = items.map((item, i) => {
            if (!item.datetime) item.datetime = travel.startDate + 'T09:00';
            item.id = Date.now() + i;
            return item;
          });

          setPreviews(result);

        } finally {
          setLoading(false);
