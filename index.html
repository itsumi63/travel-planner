                          <div className={`font-bold mb-2 ${typeColor[p.type] || 'text-gray-700'}`}>
                            {typeLabel[p.type] || p.type}：{p.title}
                          </div>
                          <div className="space-y-1 text-sm">
                            {p.datetime && <div><span className="text-gray-500">日時: </span>{new Date(p.datetime).toLocaleString('ja-JP', {month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>}
                            {p.checkOut && <div><span className="text-gray-500">チェックアウト: </span>{new Date(p.checkOut).toLocaleString('ja-JP', {month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>}
                            {p.trainDestination && <div><span className="text-gray-500">到着: </span>{p.trainDestination}</div>}
                            {p.trainLine && <div><span className="text-gray-500">路線: </span>{p.trainLine}</div>}
                            {p.airline && <div><span className="text-gray-500">航空会社: </span>{p.airline} {p.flightNumber}</div>}
                            {p.amount > 0 && <div><span className="text-gray-500">金額: </span><span className="font-bold text-indigo-600">¥{Number(p.amount).toLocaleString()}</span></div>}
                            {p.cancelDeadline && <div><span className="text-gray-500">キャンセル期日: </span><span className="text-amber-700 font-semibold">{new Date(p.cancelDeadline).toLocaleString('ja-JP', {month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span></div>}
                            {p.notes && <div><span className="text-gray-500">メモ: </span>{p.notes}</div>}
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                  <div className="flex gap-2">
                    {previews.length === 1 ? (
                      <button onClick={() => onImport(previews)}
                        className="flex-1 bg-indigo-600 text-white rounded-xl py-3 font-semibold hover:bg-indigo-700 transition">
                        ✅ 追加する
                      </button>
                    ) : (
                      <>
                        <button
                          onClick={() => {
                            const selected = previews.filter((_, i) => selectedIndexes.includes(i));
                            if (selected.length === 0) { alert('追加する予定を選択してください'); return; }
                            onImport(selected);
                          }}
                          disabled={selectedIndexes.length === 0}
                          className="flex-1 bg-indigo-600 text-white rounded-xl py-3 font-semibold hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                          ✅ 選択した{selectedIndexes.length}件を追加
                        </button>
                        <button onClick={() => onImport(previews)}
                          className="bg-gray-700 text-white rounded-xl px-4 py-3 font-semibold hover:bg-gray-800 transition whitespace-nowrap">
                          📋 全{previews.length}件追加
                        </button>
                      </>
                    )}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function QRModal({ imageData, onClose }) {
      return (
        <div
          className="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center p-4 z-50"
          onClick={onClose}
        >
          <div className="max-w-4xl w-full">
            <div className="flex justify-end mb-4">
              <button
                onClick={onClose}
                className="text-white bg-white bg-opacity-20 rounded-full p-2 hover:bg-opacity-30 transition"
              >
                <X size={32} />
              </button>
            </div>
            <img
              src={imageData}
              alt="QR Code"
              className="w-full h-auto bg-white rounded-lg"
              onClick={(e) => e.stopPropagation()}
            />
            <p className="text-white text-center mt-4 text-sm">画面をタップして閉じる</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- Service Worker 登録（PWA） -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then((reg) => console.log('SW registered:', reg.scope))
          .catch((err) => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
